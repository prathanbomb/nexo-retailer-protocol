name: no_std bare-metal build and test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  no_std-build:
    name: Build and test for bare-metal target (thumbv7em-none-eabihf)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build with no-default-features
        run: cargo build --no-default-features --target thumbv7em-none-eabihf

      - name: Build with alloc feature
        run: cargo build --features alloc --target thumbv7em-none-eabihf

      - name: Run tests on bare-metal target (alloc feature)
        run: |
          echo "Starting test execution at $(date)"
          START_TIME=$(date +%s)
          cargo test --target thumbv7em-none-eabihf --no-default-features --features alloc --no-fail-fast 2>&1 | tee test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "Test execution time: ${DURATION}s"
          if [ $DURATION -gt 600 ]; then
            echo "WARNING: Tests exceeded 10 minute threshold"
          fi
          exit $TEST_EXIT_CODE

      - name: Run tests with embassy feature
        run: |
          echo "Starting embassy test execution at $(date)"
          START_TIME=$(date +%s)
          cargo test --target thumbv7em-none-eabihf --features embassy,alloc --no-fail-fast 2>&1 | tee embassy_test_output.txt || true
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "Embassy test execution time: ${DURATION}s"
          # Embassy tests may require hardware, so we don't fail the build
          echo "Note: Embassy tests requiring hardware are marked #[ignore]"

      - name: Run dependency audit (check for std leakage)
        run: |
          echo "Checking for std leakage in no_std build..."
          # Check no-default-features build
          cargo tree --target thumbv7em-none-eabihf --no-default-features | grep -i "std" && {
            echo "ERROR: std dependency found in no_std build!"
            exit 1
          } || echo "PASS: No std dependencies found (no-default-features)"

          # Check alloc feature build
          cargo tree --target thumbv7em-none-eabihf --features alloc | grep -i "std" && {
            echo "ERROR: std dependency found in alloc build!"
            exit 1
          } || echo "PASS: No std dependencies found (alloc)"

          # Check embassy feature build
          cargo tree --target thumbv7em-none-eabihf --features embassy,alloc | grep -i "std" && {
            echo "ERROR: std dependency found in embassy build!"
            exit 1
          } || echo "PASS: No std dependencies found (embassy)"

      - name: Build documentation for bare-metal target
        run: cargo doc --no-deps --target thumbv7em-none-eabihf
