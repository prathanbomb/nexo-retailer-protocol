name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-std:
    name: Test on std target
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (std)
        run: |
          echo "Starting std test execution at $(date)"
          START_TIME=$(date +%s)
          cargo test --features std 2>&1 | tee std_test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "Std test execution time: ${DURATION}s"
          if [ $DURATION -gt 300 ]; then
            echo "WARNING: Std tests exceeded 5 minute threshold"
          fi
          exit $TEST_EXIT_CODE

      - name: Run tests (no_std alloc)
        run: |
          echo "Starting no_std alloc test execution at $(date)"
          START_TIME=$(date +%s)
          cargo test --no-default-features --features alloc 2>&1 | tee alloc_test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "No_std alloc test execution time: ${DURATION}s"
          if [ $DURATION -gt 300 ]; then
            echo "WARNING: No_std alloc tests exceeded 5 minute threshold"
          fi
          exit $TEST_EXIT_CODE

      - name: Check proptest regressions
        run: |
          echo "Checking for uncommitted proptest regression files..."
          if [ -d "proptest-regressions" ]; then
            # Check if there are any uncommitted changes in proptest-regressions
            if git diff --name-only proptest-regressions/ | grep -q .; then
              echo "ERROR: Uncommitted proptest regression files found!"
              git diff --name-only proptest-regressions/
              exit 1
            fi
            # Check for untracked regression files
            UNTRACKED=$(git status --porcelain proptest-regressions/ | grep "^??" || true)
            if [ -n "$UNTRACKED" ]; then
              echo "ERROR: Untracked proptest regression files found!"
              echo "$UNTRACKED"
              exit 1
            fi
            echo "PASS: All proptest regression files are properly committed"
          else
            echo "No proptest-regressions directory exists yet"
          fi

      - name: Verify std feature enables std
        run: |
          echo "Verifying std feature properly enables std..."
          cargo tree --features std | grep -q "tokio" && echo "PASS: std feature enables tokio" || {
            echo "ERROR: std feature should enable tokio"
            exit 1
          }
          cargo tree --features std | grep -q "tracing" && echo "PASS: std feature enables tracing" || {
            echo "ERROR: std feature should enable tracing"
            exit 1
          }

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test-std
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-tarpaulin

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage report
        run: |
          cargo tarpaulin --features std --out Xml --output-dir ./coverage --timeout 300 --skip-clean

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
