// ActiveCurrencyAndAmount - CRITICAL monetary type (SCHEMA-05)
// Source: XSD complexType with xs:decimal base (fractionDigits=5, totalDigits=18)
// Converted to integer representation to avoid IEEE 754 precision loss
// Nanos must match sign of units, range -999999999 to +999999999
message ActiveCurrencyAndAmount {
  string ccy = 1;   // ISO 4217 currency code
  int64 units = 2;  // Whole currency units
  int32 nanos = 3;  // Nano (10^-9) units, must match sign of units
}

// ActiveCurrencyCode - ISO 4217 currency code pattern
// Source: XSD simpleType with pattern [A-Z]{3,3}
// Validation logic implemented in Phase 2
message ActiveCurrencyCode {
  string value = 1;
}

