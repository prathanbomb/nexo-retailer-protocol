// Header4 - Message header (used across all CASP messages)
message Header4 {
  optional string msg_fctn = 1;  // MessageFunction1Code
  optional string proto_vrsn = 2;
  optional string orgnl_biz_t_msg = 3;
  optional string orgnl_msg_id = 4;
  optional string tx_id = 5;
