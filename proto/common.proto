// AggregationTransaction3 - Aggregated transaction details
message AggregationTransaction3 {
  optional int64 frst_pmt_dt_tm = 1;   // First payment date/time (unix timestamp nanos)
  optional int64 last_pmt_dt_tm = 2;   // Last payment date/time (unix timestamp nanos)
  optional int32 nb_of_pmts = 3;       // Number of payments
  repeated DetailedAmount21 indv_pmt = 4; // Individual payments
}

// DetailedAmount21 - Detailed amount breakdown
message DetailedAmount21 {
  optional ActiveCurrencyAndAmount amt = 1;
